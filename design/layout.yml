# Zwyssigstrasse 11 — Semantic Layout
# Machine-readable description of the apartment layout for spatial reasoning.
# Derived from apartment/floorplan.svg and interior/concept.md.
# Dimensions are approximate (SVG scale ~60 px/m). Cardinal orientations unknown;
# walls are named by floorplan position: plan_left / plan_right / plan_top / plan_bottom.
# plan_left and plan_bottom-left are the building's exterior long facade (all bedrooms + bath).
# plan_right / plan_bottom are exterior on the balkon/wintergarten side.
# plan_top (north of the apartment) faces the shared Treppenhaus (stairwell).

meta:
  address: Zwyssigstrasse 11, Zürich
  floor: 1. Obergeschoss
  rooms_nominal: 4.5
  total_area_m2_approx: 100
  floor_finish: large-format dark anthracite stone-look tiles (throughout, fixed)
  wall_finish: white smooth plaster
  heating: underfloor (throughout)
  scale_px_per_m: 60
  # Each room's `bbox` is in the same SVG coordinate system as apartment/floorplan.svg
  # (60 px/m). Use it to crop the master plan or to position furniture from
  # interior/furniture.yml. Furniture coords are cm-from-room-origin (top-left).

